[tox]
envlist = py37, py38, py39, py310, py311, py312
isolated_build = True

[testenv]
deps =
    pytest
    pytest-cov
    -rrequirements-dev.txt
commands =
    pytest tests/ --cov=src/python_gmail_lib --cov-report=term-missing

[testenv:lint]
deps =
    flake8
    black
    isort
commands =
    black --check src/python_gmail_lib tests
    isort --check-only src/python_gmail_lib tests
    flake8 src/python_gmail_lib tests

[testenv:type-check]
deps = mypy
commands = mypy src/python_gmail_lib
